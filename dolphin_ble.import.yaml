substitutions:
  device_name: dolphin-ble
  friendly_name: Dolphin BLE
  # Optional. Leave blank to auto-discover a Maytronics power supply advertising
  # the Dolphin BLE service; set this if multiple matching devices are nearby.
  dolphin_mac: ""
  dolphin_temperature_supported: "false"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: jim.dolphin_ble
    version: "1.0"

dashboard_import:
  package_import_url: github://jimparis/esphome-dolphin-plus/dolphin_ble.import.yaml@master
  import_full_config: false

wifi:
  # This fallback AP lets a freshly flashed device receive Wi-Fi credentials.
  ap:
    password: "dolphinble"

captive_portal:

improv_serial:

esp32_improv:
  authorizer: none

api:

ota:
  - platform: esphome

external_components:
  - source: github://jimparis/esphome-dolphin-plus@master
    components:
      - dolphin_ble

packages:
  dolphin_ble:
    url: https://github.com/jimparis/esphome-dolphin-plus
    files:
      - packages/dolphin_ble.yaml
    ref: master
    refresh: 0s
