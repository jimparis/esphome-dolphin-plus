substitutions:
  device_name: dolphin-ble
  friendly_name: Dolphin BLE
  # Set this to your Dolphin power supply BLE MAC before compiling, or adopt the
  # device in ESPHome Dashboard and edit it there.
  dolphin_mac: "00:00:00:00:00:00"
  # Optional BLE advertisement name filter. Leave blank to match by MAC only.
  dolphin_name_filter: ""
  dolphin_temperature_supported: "false"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: jimsh.dolphin_ble
    version: "0.1.0"

dashboard_import:
  package_import_url: github://jimsh/esphome-dolphin-plus/dolphin_ble.import.yaml@main
  import_full_config: false

wifi:
  # This fallback AP lets a freshly flashed device receive Wi-Fi credentials.
  ap:
    password: "dolphinble"

captive_portal:

improv_serial:

esp32_improv:
  authorizer: none

api:

ota:
  - platform: esphome

external_components:
  - source: github://jimsh/esphome-dolphin-plus@main
    components:
      - dolphin_ble

packages:
  dolphin_ble:
    url: https://github.com/jimsh/esphome-dolphin-plus
    files:
      - packages/dolphin_ble.yaml
    ref: main
    refresh: 1d
