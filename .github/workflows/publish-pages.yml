name: Publish Pages

on:
  workflow_run:
    workflows:
      - Publish Firmware
    types:
      - completed


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download firmware artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dolphin-ble
          path: firmware-artifact
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Stage firmware files
        run: |
          set -euo pipefail
          shopt -s nullglob
          cp -a static page-source
          mkdir -p page-source/firmware
          version_dir="$(find firmware-artifact -mindepth 1 -maxdepth 1 -type d | sort | tail -n1)"
          if [ -z "$version_dir" ]; then
            echo "No firmware version directory found in downloaded artifact"
            find firmware-artifact -maxdepth 3 -type f -print
            exit 1
          fi
          cp "$version_dir/manifest.json" page-source/firmware/dolphin_ble.manifest.json
          for file in "$version_dir"/*.{bin,elf}; do
            cp "$file" page-source/firmware/
            md5sum "$file" | head -c 32 > "page-source/firmware/$(basename "$file").md5"
            sha256sum "$file" | head -c 64 > "page-source/firmware/$(basename "$file").sha256"
          done

      - name: Build
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697  # v1.0.13
        with:
          source: ./page-source
          destination: ./output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: output
          retention-days: 1

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
