esphome:
  name: dolphin-ble
  friendly_name: Dolphin BLE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_ENABLE: y
      CONFIG_BT_GATTS_ENABLE: y

logger:
  level: DEBUG

web_server:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

esp32_ble:
  io_capability: none

external_components:
  - source:
      type: local
      path: components

dolphin_ble:
  id: dolphin_bridge
  mac_address: !secret dolphin_mac
  name_filter: !secret dolphin_name_filter
  auto_probe: true
  repeat_probes: true
  probes:
    - name: pws_features
      text: "03:ab03fffa1a000002c1"
      delay_ms: 5000
    - name: system_status
      text: "03:ab03fff807000002ac"
      delay_ms: 1500
    - name: temperature
      text: "03:ab03fff809000002ae"
      delay_ms: 1500
    - name: get_mu_data
      text: "03:ab03fffd0100030100ff03ae"
      delay_ms: 2000
    - name: get_sm_data
      text: "03:ab03fffd0200030200ff03b0"
      delay_ms: 2000

