substitutions:
  device_name: dolphin-ble
  friendly_name: Dolphin BLE
  dolphin_mac: ""

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: jim.dolphin_ble
    version: "1.0"
  name_add_mac_suffix: true

wifi:

api:

ota:
  - platform: esphome

external_components:
  - source: github://jimparis/esphome-dolphin-plus@master
    refresh: 10min
    components:
      - dolphin_ble

packages:
  dolphin_ble:
    url: https://github.com/jimparis/esphome-dolphin-plus
    files:
      - packages/dolphin_ble.yaml
    ref: master
    refresh: 10min
