    mode: text
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: friday_time
    name: Friday Cleaning Time
    mode: text
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: saturday_time
    name: Saturday Cleaning Time
    mode: text
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: sunday_time
    name: Sunday Cleaning Time
