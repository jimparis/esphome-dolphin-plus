substitutions:
  device_name: dolphin-ble
  friendly_name: Dolphin BLE
  dolphin_mac: ""
  dolphin_temperature_supported: "false"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: jim.dolphin_ble
    version: "1.0"

dashboard_import:
  package_import_url: github://jimparis/esphome-dolphin-plus/dolphin_ble.import.yaml@master
  import_full_config: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: components
    components:
      - dolphin_ble

packages:
  dolphin_ble: !include packages/dolphin_ble.yaml
