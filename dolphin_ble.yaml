substitutions:
  device_name: dolphin-ble
  friendly_name: Dolphin BLE
  dolphin_mac: !secret dolphin_mac
  dolphin_name_filter: !secret dolphin_name_filter
  dolphin_temperature_supported: "false"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: jimsh.dolphin_ble
    version: "0.1.0"

dashboard_import:
  package_import_url: github://jimsh/esphome-dolphin-plus/dolphin_ble.import.yaml@main
  import_full_config: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

external_components:
  - source:
      type: local
      path: components
    components:
      - dolphin_ble

packages:
  dolphin_ble: !include packages/dolphin_ble.yaml
