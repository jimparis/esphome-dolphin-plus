esphome:
  name: dolphin-ble
  friendly_name: Dolphin BLE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_ENABLE: y
      CONFIG_BT_GATTS_ENABLE: y

logger:
  level: DEBUG

web_server:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

esp32_ble:
  io_capability: none

external_components:
  - source:
      type: local
      path: components

dolphin_ble:
  id: dolphin_bridge
  mac_address: !secret dolphin_mac
  name_filter: !secret dolphin_name_filter
  time_id: sntp_time

time:
  - platform: sntp
    id: sntp_time

text_sensor:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: robot_state
    name: Robot State
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: pws_state
    name: PWS State
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: cleaning_mode
    name: Cleaning Mode
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: in_water_status
    name: In Water Status
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: pws_features
    name: PWS Features
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: filter_status
    name: Filter Status
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: wifi_ssid
    name: WiFi SSID
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: quick_features
    name: Quick Features
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_sw_version
    name: MU Software Version

sensor:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: filter_state
    name: Filter Clog Level
    unit_of_measurement: "%"
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: cycle_duration
    name: Configured Cycle Duration
    unit_of_measurement: "s"
    device_class: duration
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: cycle_start_time
    name: Cycle Start Time
    device_class: timestamp
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: temperature
    name: Water Temperature
    unit_of_measurement: "°C"
    device_class: temperature
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: robot_type
    name: Robot Type ID
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: turn_on_count
    name: Total Boot Count
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_flash_write_counter
    name: MU Flash Write Counter
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_pcb_runtime
    name: MU PCB Runtime
    unit_of_measurement: "h"
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_impeller_runtime
    name: MU Impeller Runtime
    unit_of_measurement: "h"
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_not_completed_cycles
    name: MU Not Completed Cycles
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: mu_climb_period
    name: MU Climb Period
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: sm_timezone
    name: SM Timezone Offset

button:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: start_cleaning
    name: Start Cleaning
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: stop_cleaning
    name: Stop Cleaning
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: pickup_mode
    name: Pickup Mode

select:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: cleaning_mode
    name: Cleaning Mode Control
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    kind: manual_drive_direction
    name: Manual Drive Direction

number:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    name: Manual Drive Speed

light:
  - platform: dolphin_ble
    dolphin_ble_id: dolphin_bridge
    name: LED Light
    default_transition_length: 0s
    effects:
      - lambda:
          name: "Blinking"
          update_interval: 10s
          lambda: ""
      - lambda:
          name: "Constant"
          update_interval: 10s
          lambda: ""
      - lambda:
          name: "Disco"
          update_interval: 10s
          lambda: ""
