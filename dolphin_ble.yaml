esphome:
  name: dolphin-ble
  friendly_name: Dolphin BLE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      # smaller binary, more RAM
      minimum_chip_revision: "3.1"
      sram1_as_iram: true
    sdkconfig_options:
      CONFIG_BT_GATTC_ENABLE: y
      CONFIG_BT_GATTS_ENABLE: y

logger:
  level: DEBUG

web_server:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

esp32_ble:
  io_capability: none

# Relay BLE advertisements to Home Assistant without asking devices for scan-response data.
# If an advertisement-only device is missing fields, try setting this active scan flag to true
# before enabling active GATT proxying below.
esp32_ble_tracker:
  scan_parameters:
    active: false

bluetooth_proxy:
  # Keep outbound Home Assistant GATT connections off this node so they do not
  # compete with the Dolphin BLE session. Advertisement relay still works.
  active: false

external_components:
  - source:
      type: local
      path: components

dolphin_ble:
  id: dolphin_bridge
  mac_address: !secret dolphin_mac
  name_filter: !secret dolphin_name_filter
  time_id: sntp_time
  # This detail is profile-specific and may differ across robot models or firmware.
  temperature_supported: false

time:
  - platform: sntp
    id: sntp_time

